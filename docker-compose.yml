services:
  postgres:
    image: postgres:16-alpine
    container_name: easy_resume_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easy_resume
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easy_resume"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: easy_resume_postgres_data
